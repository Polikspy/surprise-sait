[build.environment]
  PYTHON_VERSION = "3.12"
  [build]
  publish = "dist"
  command = "pip install flet && flet publish main.py"

[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
